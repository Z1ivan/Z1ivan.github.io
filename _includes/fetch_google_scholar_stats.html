<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json")
            .done(function (data) {
                var totalCitation = data['citedby'];
                var totalCitElement = document.getElementById('total_cit');
                if (totalCitElement) {
                    totalCitElement.innerHTML = totalCitation;
                }

                var publications = data['publications'] || {};
                var citationEles = document.getElementsByClassName('show_paper_citations');
                Array.prototype.forEach.call(citationEles, function (element) {
                    var paperId = element.getAttribute('data');
                    if (publications[paperId] && publications[paperId]['num_citations'] != null) {
                        element.innerHTML = '| Citations: ' + publications[paperId]['num_citations'];
                    }
                });
            })
            .fail(function () {
                // Ignore network/data failures to avoid breaking the page.
            });
    })
</script>
